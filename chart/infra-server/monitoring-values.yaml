kube-prometheus-stack:
  namespaceOverride: monitoring

  grafana:
    enabled: false

  defaultRules:
    rules:
      kubeApiserverAvailability: false
      kubeApiserverBurnrate: false
      kubeApiserverHistogram: false
      kubeApiserverSlos: false
      kubeControllerManager: false
      kubelet: false
      kubeProxy: false
      kubeSchedulerAlerting: false
      kubeSchedulerRecording: false
      kubeStateMetrics: false
      # Disables kubernetes-system{,-apiserver,-kubelet} rules; the kubelet group
      # still matched without kube-state-metrics scrape targets.
      kubernetesSystem: false
      node: false
      nodeExporterAlerting: false
      nodeExporterRecording: false

  prometheusOperator:
    resources:
      limits:
        cpu: 100m
        ephemeral-storage: 1Gi
        memory: 256Mi
      requests:
        cpu: 100m
        ephemeral-storage: 1Gi
        memory: 256Mi
    kubeletService:
      enabled: false

  prometheus:
    prometheusSpec:
      resources:
        limits:
          cpu: 100m
          ephemeral-storage: 1Gi
          memory: 256Mi
        requests:
          cpu: 100m
          ephemeral-storage: 1Gi
          memory: 256Mi
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 8Gi

  kubeStateMetrics:
    enabled: false

  nodeExporter:
    enabled: false

  kubelet:
    enabled: false

  kubeApiServer:
    enabled: false

  kubeControllerManager:
    enabled: false

  kubeScheduler:
    enabled: false

  coreDns:
    enabled: false

  kubeProxy:
    enabled: false

  alertmanager:
    alertmanagerSpec:
      resources:
        limits:
          cpu: 100m
          ephemeral-storage: 1Gi
          memory: 256Mi
        requests:
          cpu: 100m
          ephemeral-storage: 1Gi
          memory: 256Mi
      alertmanagerConfigSelector:
        matchLabels:
          alertmanagerConfig: slack
